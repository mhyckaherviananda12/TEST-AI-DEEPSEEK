<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Pro Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --primary: #10a37f; /* Warna hijau khas AI modern */
            --primary-hover: #0d8a6b;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --user-bubble: #f3f4f6;
            --bot-bubble: #ffffff;
            --reasoning-bg: #f9fafb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh;
            color: var(--text-main);
        }

        .chat-container { 
            width: 100%; 
            max-width: 850px; 
            height: 95vh;
            background: var(--chat-bg); 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .header { 
            padding: 20px 24px; 
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header h1 { font-size: 1.1rem; font-weight: 600; color: var(--text-main); }
        .header p { font-size: 0.85rem; color: var(--text-muted); }

        .chat-box { 
            flex: 1; 
            padding: 24px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Custom Scrollbar */
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .chat-box::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        .message { display: flex; gap: 16px; max-width: 100%; }
        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .user .avatar { background: var(--primary); color: white; }
        .bot .avatar { background: #1f2937; color: white; }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 75%;
        }
        
        .user .message-content { align-items: flex-end; }

        .bubble { 
            padding: 14px 18px; 
            border-radius: 12px; 
            line-height: 1.6; 
            font-size: 0.95rem;
        }
        
        .user .bubble { 
            background: var(--user-bubble); 
            color: var(--text-main); 
            border-top-right-radius: 4px; 
        }
        
        .bot .bubble { 
            background: var(--bot-bubble); 
            border: 1px solid var(--border);
            border-top-left-radius: 4px; 
        }

        .reasoning { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            background: var(--reasoning-bg); 
            border: 1px solid var(--border);
            border-radius: 8px; 
            padding: 12px 16px; 
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .reasoning-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4b5563;
        }

        .input-area { 
            padding: 20px 24px; 
            background: var(--chat-bg); 
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            background: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            padding: 6px 6px 6px 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
        }

        .input-wrapper input { 
            flex: 1; 
            border: none; 
            outline: none; 
            font-size: 0.95rem; 
            background: transparent;
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 40px;
            height: 40px;
            border-radius: 50%; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; 
            transition: background 0.2s; 
        }

        .input-wrapper button:hover { background: var(--primary-hover); }
        .input-wrapper button svg { width: 18px; height: 18px; fill: currentColor; }

        .loading { 
            display: flex; 
            gap: 4px;
            padding: 14px 18px;
            align-items: center;
        }
        
        .dot {
            width: 6px; height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="avatar" style="background: #1f2937; color: white;">AI</div>
        <div>
            <h1>DeepSeek Pro</h1>
            <p>Advanced Reasoning Assistant</p>
        </div>
    </div>
    
    <div class="chat-box" id="chat-box">
        <div class="message bot">
            <div class="avatar">AI</div>
            <div class="message-content">
                <div class="bubble">Halo! Saya adalah asisten AI DeepSeek. Ada yang bisa saya bantu hari ini?</div>
            </div>
        </div>
    </div>
    
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Tanyakan apa saja ke DeepSeek..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" title="Kirim">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    // MASUKKAN API KEY DEEPSEEK KAMU DI SINI
    const API_KEY = 'sk-1c6d8374ddb44b2f90bb018f1c6c603a'; 
    
    // Array untuk menyimpan konteks percakapan (Turn 1, Turn 2, dst)
    let messageHistory = [];

    async function sendMessage() {
        const inputField = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const userText = inputField.value.trim();

        if (!userText) return;

        // 1. Tampilkan pesan user di UI
        appendMessage('user', userText);
        inputField.value = '';

        // 2. Tambahkan pesan user ke history array
        messageHistory.push({ role: "user", content: userText });

        // 3. Tampilkan indikator loading (Animasi 3 titik)
        const loadingId = 'loading-' + Date.now();
        chatBox.innerHTML += `
            <div class="message bot" id="${loadingId}">
                <div class="avatar">AI</div>
                <div class="message-content">
                    <div class="bubble loading">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                </div>
            </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 4. Panggil API DeepSeek
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-reasoner",
                    messages: messageHistory,
                    reasoning_effort: "high"
                })
            });

            if (!response.ok) {
                throw new Error(`API Error: ${response.status} ${response.statusText}`);
            }

            const data = await response.json();
            const botReply = data.choices[0].message;

            // Hapus loading
            document.getElementById(loadingId).remove();

            // 5. Tampilkan pesan bot di UI (Reasoning + Content)
            appendMessage('bot', botReply.content, botReply.reasoning_content);

            // 6. Simpan respons bot ke history array
            messageHistory.push({
                role: "assistant",
                content: botReply.content,
                reasoning_content: botReply.reasoning_content || ""
            });

        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage('bot', `Maaf, terjadi kesalahan: ${error.message}`);
        }
    }

    function appendMessage(sender, text, reasoning = null) {
        const chatBox = document.getElementById('chat-box');
        const avatarText = sender === 'user' ? 'U' : 'AI';
        
        let htmlContent = `
            <div class="message ${sender}">
                <div class="avatar">${avatarText}</div>
                <div class="message-content">`;
        
        // Jika API mengembalikan proses berpikir (reasoning)
        if (reasoning) {
            htmlContent += `
                <div class="reasoning">
                    <div class="reasoning-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        Proses Berpikir
                    </div>
                    ${reasoning.replace(/\n/g, '<br>')}
                </div>`;
        }
        
        // Teks Utama
        if (text) {
            htmlContent += `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
        }
        
        htmlContent += `
                </div>
            </div>`;
        
        chatBox.innerHTML += htmlContent;
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
